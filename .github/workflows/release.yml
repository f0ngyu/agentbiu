name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package macOS
        run: bun run package:macos

      - name: Zip macOS bundle
        run: cd release && ditto -c -k --sequesterRsrc --keepParent AgentBIU-macos AgentBIU-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBIU-macos-zip
          path: release/AgentBIU-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package Windows
        run: bun run package:windows

      - name: Zip Windows bundle
        shell: pwsh
        run: Compress-Archive -Path 'release/AgentBIU-windows' -DestinationPath 'release/AgentBIU-windows.zip' -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBIU-windows-zip
          path: release/AgentBIU-windows.zip

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: AgentBIU-*-zip
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AgentBIU-macos.zip
            artifacts/AgentBIU-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
